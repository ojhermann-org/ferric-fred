# Publish the ferric-fred MCP server to the official MCP registry
# (https://github.com/modelcontextprotocol/registry).
#
# The registry entry lives in ../server.json. Ownership is proven two ways:
#   * namespace  io.github.ojhermann-org/*  — via GitHub OIDC from this repo's
#     own Actions (no stored secret); see `mcp-publisher login github-oidc`.
#   * the cargo package  ferric-fred-mcp  — via the `mcp-name:` token in the
#     crate README, which must already be live on crates.io for the version in
#     server.json before this runs.
#
# Triggers:
#   * workflow_dispatch — the reliable path for the FIRST publish: run it after
#     the target crate version (and its rendered README) is live on crates.io.
#   * push of a `ferric-fred-mcp-vX.Y.Z` tag — re-publishes on each MCP-crate
#     release (release-plz tags per crate). The retry loop absorbs the brief lag
#     while crates.io renders the freshly published README.
name: Publish to MCP Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "ferric-fred-mcp-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — proves the io.github.ojhermann-org namespace
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync version from the release tag into server.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/ferric-fred-mcp-v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json
          echo "server.json version -> $VERSION"

      - name: Authenticate to the registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish (retry to absorb crates.io README-render lag)
        run: |
          for attempt in 1 2 3 4 5 6; do
            if ./mcp-publisher publish; then
              echo "published on attempt $attempt"
              exit 0
            fi
            echo "attempt $attempt failed; the crate README may still be rendering — waiting 30s"
            sleep 30
          done
          echo "publish did not succeed after retries"
          exit 1
