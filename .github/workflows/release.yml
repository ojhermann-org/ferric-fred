name: Release

# release-plz drives per-crate versioning and publishing from Conventional
# Commits (ADR-0012). On every push to main it does two things:
#   * release-pr — open/update a PR that bumps versions and changelogs for the
#     next release (review gate);
#   * release    — publish to crates.io any crate whose version isn't yet on the
#     registry, and tag it.
#
# The crates.io token is NOT a GitHub secret: it lives in Infisical at
# dev:/shared/CARGO_REGISTRY_TOKEN and is injected into release-plz via the
# ferric-fred-ci machine identity, exactly like live.yml injects FRED_API_KEY
# (ADR-0018). GitHub Actions holds only the two Infisical bootstrap secrets.
#
# Gated like live.yml: if the Infisical machine identity isn't configured, the
# release job is skipped and the workflow is a green no-op — so a fork or an
# un-provisioned clone never fails here.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push tags / create GitHub releases
  pull-requests: write # open/update the release PR

jobs:
  gate:
    name: Check for Infisical machine identity
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      # Secrets can't be referenced in a job-level `if:`, so gate here and expose
      # the result as an output the release job depends on.
      - id: check
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
        run: |
          if [ -n "${INFISICAL_CLIENT_ID}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Infisical machine identity not configured — skipping release. See ADR-0016/0018."
          fi

  release:
    name: release-plz (release-pr + publish)
    needs: gate
    if: needs.gate.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: release-plz compares against the last release tag to
      # decide each crate's bump and what is unpublished.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Same flake as dev / CI / live (ADR-0008): the Rust toolchain and the
      # infisical CLI both come from the dev shell, so publish uses the exact
      # toolchain the gates ran against.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Expose the flake's Rust toolchain on PATH
        run: nix develop --command bash -c 'dirname "$(command -v cargo)" >> "$GITHUB_PATH"'

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # release-plz isn't in the flake; install the prebuilt binary onto the
      # runner PATH (visible inside `nix develop --command`, which keeps PATH).
      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      # Authenticate the machine identity, then run release-plz under
      # `infisical run` so CARGO_REGISTRY_TOKEN (from dev:/shared) reaches
      # `cargo publish` as an env var — never a GitHub secret or a file.
      #
      # release-plz's CLI takes the GitHub token as the `--git-token` flag (it
      # does NOT read GITHUB_TOKEN from the env); the crates.io token, by
      # contrast, is read from the injected CARGO_REGISTRY_TOKEN env var. So the
      # two tokens travel by different channels. GITHUB_TOKEN is auto-masked by
      # Actions in logs; the runner is ephemeral and single-tenant.
      #
      # Order is publish-then-PR: `release` publishes any unreleased crate
      # versions (library first — release-plz orders by the dependency graph),
      # then `release-pr` refreshes the next-release PR. Publishing first means
      # the just-released version is never re-proposed by the PR pass.
      - name: Release
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INFISICAL_PROJECT_ID="$(jq -r .workspaceId .infisical.json)"
          export INFISICAL_PROJECT_ID
          nix develop --command bash -c '
            set -euo pipefail
            login_token="$(infisical login --method=universal-auth \
              --client-id="$INFISICAL_CLIENT_ID" \
              --client-secret="$INFISICAL_CLIENT_SECRET" \
              --plain --silent)"
            echo "::add-mask::$login_token"
            run_rp() {
              infisical run --token="$login_token" \
                --projectId="$INFISICAL_PROJECT_ID" \
                --env=dev --path=/shared -- \
                release-plz "$@" --git-token "$GITHUB_TOKEN"
            }
            # WARNING: this whole script runs inside a single-quoted bash -c
            # string, so NO apostrophes anywhere in here — a stray one silently
            # ends the string and breaks the script. Avoid contractions.
            #
            # `release` (publish + tag + GitHub release) must succeed. `release-pr`
            # only opens the next version-bump PR; it is kept best-effort so a
            # transient failure cannot fail an otherwise-successful publish. It
            # needs the repo setting "Allow GitHub Actions to create and approve
            # pull requests" ON — the org permits it, and it is enabled at the repo
            # level (ADR-0012). With it off, release-pr 403s and opens no PR, and
            # versions must be bumped by hand.
            run_rp release
            run_rp release-pr \
              || echo "::warning::release-pr skipped (creating the version-bump PR is not permitted); release/publish succeeded"
          '
