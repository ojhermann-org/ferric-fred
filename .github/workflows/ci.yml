name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes cancel in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt · clippy · test · deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # CI uses the same Nix flake as local dev (ADR-0008), so the Rust
      # toolchain, cargo-nextest, and cargo-deny versions match exactly — a gate
      # that passes locally passes here.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Swatinem/rust-cache keys its cache off `rustc`/`cargo`, which live in the
      # flake dev shell rather than on the runner's PATH. Expose that bin dir so
      # the cache action (and its cargo-metadata probe) can find the toolchain.
      - name: Expose the flake's Rust toolchain on PATH
        run: nix develop --command bash -c 'dirname "$(command -v cargo)" >> "$GITHUB_PATH"'

      # Cache ~/.cargo (registry/git) and target/ across runs so unchanged
      # dependencies aren't recompiled. Backed by the GitHub Actions cache — no
      # external service. (A /nix/store cache can be layered on top later.)
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting gate
        run: nix develop --command bash -c "cargo fmt --check"

      - name: Clippy (warnings are errors)
        run: nix develop --command bash -c "cargo clippy --all-targets -- -D warnings"

      # Offline tests only. The #[ignore] live FRED tests are skipped here;
      # running them in CI needs an Infisical machine identity (deferred; ADR-0009).
      - name: Tests
        run: nix develop --command bash -c "cargo nextest run"

      - name: Doctests
        run: nix develop --command bash -c "cargo test --doc"

      - name: Dependency policy (licenses, advisories, bans, sources)
        run: nix develop --command bash -c "cargo deny check"
