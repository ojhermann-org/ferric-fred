# cargo-deny configuration — gates dependency licenses, advisories, bans, and
# sources. Run locally with `cargo deny check`; also enforced in CI.

[licenses]
# Permissive licenses currently present in our dependency tree (all OSI/FSF
# approved, no copyleft). Kept deliberately tight: a new dependency that pulls
# an unlisted license fails the check, so we review it before it lands.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.9

[advisories]
# `paste` (a build-time proc-macro pulled in transitively by ratatui) was
# archived by its author: flagged unmaintained, not vulnerable, with no drop-in
# upgrade available. Low risk — it runs only at build time. Revisit if ratatui
# drops it or a real vulnerability is published.
ignore = ["RUSTSEC-2024-0436"]

[bans]
# Duplicate versions are noisy but not fatal; wildcard version specs are banned.
# (Internal path deps are given an explicit version in their Cargo.toml, so they
# are not wildcards — required anyway for publishing to crates.io.)
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only the official crates.io registry; no ad-hoc git or unknown registries.
unknown-registry = "deny"
unknown-git = "deny"
